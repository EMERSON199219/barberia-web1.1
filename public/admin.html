<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Barbería</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 id="admin-titulo">Panel Admin</h1>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="admin.html">Reservas</a></li>
                <li><a href="superadmin.html">Superadmin</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="admin-card" id="login-section">
            <h2>Ingreso Barbería</h2>
            <form id="login-form">
                <select id="barberia-select" required>
                    <option value="">Selecciona tu barbería</option>
                </select>
                <input type="text" id="admin-user" placeholder="Usuario" required>
                <input type="password" id="admin-password" placeholder="Contraseña" required>
                <button type="submit">Ingresar</button>
            </form>
        </section>

        <section class="admin-container hidden" id="dashboard-section">
            <div class="admin-header">
                <h2 id="dashboard-titulo">Reservas actuales</h2>
                <button id="logout-btn">Cerrar sesión</button>
            </div>

            <div class="admin-card">
                <table class="admin-table" id="citas-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Barbero</th>
                            <th>Servicio</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Notas</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <p class="no-citas hidden" id="no-citas">No hay reservas guardadas.</p>
            </div>
        </section>
    </main>

    <script src="js/admin.js"></script>
</body>
</html>
