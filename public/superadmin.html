<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superadmin - Gestión de Barberías</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        .superadmin-container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .barberia-card { background: #1a1a2e; padding: 1.5rem; margin-bottom: 1rem; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .barberia-info h3 { margin: 0 0 0.5rem 0; color: #fff; }
        .barberia-info p { margin: 0; color: #aaa; font-size: 0.9rem; }
        .barberia-actions { display: flex; gap: 0.5rem; }
        .btn-activar { background: #27ae60; }
        .btn-desactivar { background: #e74c3c; }
        .btn-editar { background: #3498db; }
        .btn-eliminar { background: #e74c3c; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a2e; padding: 2rem; border-radius: 8px; width: 90%; max-width: 400px; }
        .modal-content input, .modal-content select { width: 100%; margin-bottom: 1rem; }
        .modal-buttons { display: flex; gap: 1rem; justify-content: flex-end; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <h1>🔧 Superadmin</h1>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="admin.html">Admin</a></li>
                <li><a href="superadmin.html">Superadmin</a></li>
            </ul>
        </nav>
    </header>

    <main class="superadmin-container">
        <section class="admin-card" id="login-section">
            <h2>Ingreso Superadmin</h2>
            <form id="login-form" style="max-width: 300px;">
                <input type="text" id="superadmin-user" placeholder="Usuario" required>
                <input type="password" id="superadmin-password" placeholder="Contraseña" required>
                <button type="submit">Ingresar</button>
            </form>
            <p style="color: #aaa; margin-top: 1rem;">Usuario: <strong>superadmin</strong> | Contraseña: <strong>superadmin123</strong></p>
        </section>

        <section class="admin-container hidden" id="dashboard-section">
            <div class="admin-header">
                <h2>Gestión de Barberías</h2>
                <div style="display: flex; gap: 1rem;">
                    <button id="nueva-barberia-btn" class="btn">+ Nueva Barbería</button>
                    <button id="logout-btn">Cerrar sesión</button>
                </div>
            </div>

            <div id="barberias-list"></div>
        </section>
    </main>

    <!-- Modal para crear/editar barbería -->
    <div class="modal" id="barberia-modal">
        <div class="modal-content">
            <h3 id="modal-titulo">Nueva Barbería</h3>
            <form id="barberia-form">
                <input type="hidden" id="barberia-id">
                <input type="text" id="barberia-nombre" placeholder="Nombre de la barbería" required>
                <input type="text" id="barberia-user" placeholder="Usuario admin" required>
                <input type="password" id="barberia-password" placeholder="Contraseña" required>
                <label style="display: block; margin-bottom: 0.5rem; color: #aaa;">Color del tema:</label>
                <select id="barberia-color" style="width: 100%; padding: 0.5rem; margin-bottom: 1rem; background: #0f0f0f; color: #fff; border: 1px solid #333; border-radius: 5px;">
                    <option value="rosado">💈 Rosado (default)</option>
                    <option value="dorado">✨ Dorado</option>
                    <option value="azul">🔵 Azul</option>
                    <option value="verde">🟢 Verde</option>
                    <option value="morado">🟣 Morado</option>
                    <option value="rojo">🔴 Rojo</option>
                    <option value="naranja">🟠 Naranja</option>
                    <option value="blanco">⚪ Blanco</option>
                </select>
                <label style="display: block; margin-bottom: 0.5rem; color: #aaa;">Logo de la barbería:</label>
                <input type="file" id="barberia-logo" accept="image/*" style="margin-bottom: 1rem; background: #0f0f0f; color: #fff; border: 1px solid #333; border-radius: 5px;">

                <div id="barberos-section" style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: #aaa;">Barberos de la barbería:</label>
                    <div id="barberos-list"></div>
                    <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                        <input type="text" id="nuevo-barbero" placeholder="Nombre del barbero" style="flex:1;">
                        <button type="button" id="agregar-barbero-btn" class="btn">Agregar</button>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/superadmin.js"></script>
</body>
</html>
